<!DOCTYPE html>
<html>
<head>
    <title>GST Calculator</title>
    <style>
        body{font-family:Arial;text-align:center;margin-top:40px}
        input,select,button{padding:10px;margin:5px;width:200px}
        .box{border:1px solid #ddd;padding:20px;width:300px;margin:auto}
    </style>
</head>
<body>

<h2>GST Calculator</h2>

<div class="box">
<form method="POST">
    <input type="number" step="0.01" name="amount" placeholder="Amount" required><br>

    <select name="gst_rate">
        <option value="5">5% GST</option>
        <option value="12">12% GST</option>
        <option value="18" selected>18% GST</option>
        <option value="28">28% GST</option>
    </select><br>

    <button name="action" value="add">Add GST</button>
    <button name="action" value="remove">Remove GST</button>
</form>

{% if result %}
<h3>Total: ₹ {{ result }}</h3>
<p>GST: ₹ {{ gst_amount }}</p>
{% endif %}
</div>

</body>
</html>
